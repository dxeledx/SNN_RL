dataset:
  iv2b:
    # MOABB dataset name: code will try BNCI2014_004 then BNCI2015_004.
    fmin: 8.0
    fmax: 30.0
    epoch_tmin: 0.0
    epoch_tmax: 4.0
    window_s: 0.5
    stride_s: 0.25
    bands:
      - [8.0, 12.0]
      - [13.0, 20.0]
      - [20.0, 30.0]

    # Protocol: screening -> feedback (no leakage)
    #
    # MOABB IV-2b meta session labels are typically:
    #   ["0train","1train","2train","3test","4test"]
    # where the "*test" sessions correspond to feedback-style evaluation sessions.
    train_sessions: ["0train", "1train", "2train"]
    eval_sessions: ["3test", "4test"]

    # Robust mapping to MOABB meta session labels.
    session_aliases:
      screening: ["0train", "1train", "2train", "screening", "train"]
      feedback: ["3test", "4test", "feedback", "test"]
